name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  backend-tests:
    name: Backend Tests (Laravel)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend-laravel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, intl, pdo_sqlite, sqlite3
          tools: composer:v2
          coverage: none

      - name: Prepare environment
        run: |
          cp .env.example .env
          touch database/database.sqlite
          php artisan key:generate

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run test suite
        run: php artisan test

  frontend-checks:
    name: Frontend Checks (Nuxt)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend-nuxt
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/frontend-nuxt/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run contract tests
        run: npm run test:contracts

      - name: Build frontend
        run: npm run build
